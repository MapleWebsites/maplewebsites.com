name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Post-deploy / periodic smoke test against the live site.
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC
  workflow_dispatch:

jobs:
  # Validates the code in this checkout by serving it locally. This is the
  # gate for pushes and PRs — it catches regressions before they deploy.
  test-local:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against local checkout
        run: npm run test:local
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-local
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # Monitors production. Runs on a schedule and on manual dispatch only, so a
  # flaky prod/network blip never blocks a PR.
  test-live:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against live site
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-live
          path: |
            test-results/
            playwright-report/
          retention-days: 7
